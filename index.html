<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Amazon SQL トレーニングアプリ</title>
  
  <!-- React と ReactDOM の読み込み -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- JSXをブラウザで解釈するためのBabel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- スタイル用のTailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 text-slate-900 font-sans">
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    // --- アイコン定義 ---
    const DatabaseIcon = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5V19A9 3 0 0 0 21 19V5"/><path d="M3 12A9 3 0 0 0 21 12"/></svg>;
    const CodeIcon = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>;
    const ChevronDownIcon = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="6 9 12 15 18 9"/></svg>;
    const ChevronUpIcon = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="18 15 12 9 6 15"/></svg>;
    const PlayIcon = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="5 3 19 12 5 21 5 3"/></svg>;
    const LightbulbIcon = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1 .2 2.2 1.5 3.5.7.9 1.2 1.5 1.5 2.5"/><path d="M9 18h6"/><path d="M10 22h4"/></svg>;
    const BookOpenIcon = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>;
    const BarChartIcon = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>;
    
    // フェーズ用アイコン
    const SearchIcon = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>;
    const WrenchIcon = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.77 3.77z"/></svg>;
    const PieChartIcon = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21.21 15.89A10 10 0 1 1 8 2.83"/><path d="M22 12A10 10 0 0 0 12 2v10z"/></svg>;

    // --- データ定義 ---
    const schemaData = [
      {
        name: "Orders (注文テーブル)",
        columns: [
          { name: "order_id", desc: "注文ID", type: "VARCHAR" },
          { name: "customer_id", desc: "顧客ID", type: "VARCHAR" },
          { name: "order_date", desc: "注文日", type: "DATE" },
          { name: "total_amount", desc: "注文合計金額", type: "INT" },
          { name: "status", desc: "ステータス ('完了', 'キャンセル', '返品')", type: "VARCHAR" }
        ]
      },
      {
        name: "OrderDetails (注文詳細テーブル)",
        columns: [
          { name: "detail_id", desc: "詳細ID", type: "VARCHAR" },
          { name: "order_id", desc: "注文ID", type: "VARCHAR" },
          { name: "product_id", desc: "商品ID", type: "VARCHAR" },
          { name: "quantity", desc: "数量", type: "INT" },
          { name: "unit_price", desc: "単価", type: "INT" }
        ]
      },
      {
        name: "Products (商品テーブル)",
        columns: [
          { name: "product_id", desc: "商品ID", type: "VARCHAR" },
          { name: "product_name", desc: "商品名", type: "VARCHAR" },
          { name: "category", desc: "カテゴリ ('家電', '本', '日用品' など)", type: "VARCHAR" },
          { name: "seller_id", desc: "出品者ID", type: "VARCHAR" },
          { name: "price", desc: "現在の価格", type: "INT" }
        ]
      },
      {
        name: "Customers (顧客テーブル)",
        columns: [
          { name: "customer_id", desc: "顧客ID", type: "VARCHAR" },
          { name: "customer_name", desc: "顧客名", type: "VARCHAR" },
          { name: "registration_date", desc: "登録日", type: "DATE" },
          { name: "is_premium", desc: "プレミアム会員フラグ (1=はい, 0=いいえ)", type: "TINYINT" }
        ]
      },
      {
        name: "Reviews (レビューテーブル)",
        columns: [
          { name: "review_id", desc: "レビューID", type: "VARCHAR" },
          { name: "product_id", desc: "商品ID", type: "VARCHAR" },
          { name: "customer_id", desc: "顧客ID", type: "VARCHAR" },
          { name: "rating", desc: "星の数 (1〜5)", type: "INT" },
          { name: "review_date", desc: "投稿日", type: "DATE" }
        ]
      }
    ];

    const phases = [
      {
        id: 'extract',
        title: 'フェーズ1: 抽出 (Extract)',
        icon: SearchIcon,
        color: 'text-blue-400',
        bgColor: 'bg-blue-500',
        borderColor: 'border-blue-500',
        desc: '膨大なデータから、目的に合った必要なレコードだけを正確にフィルタリングして取り出すステップです。'
      },
      {
        id: 'transform',
        title: 'フェーズ2: 加工 (Transform)',
        icon: WrenchIcon,
        color: 'text-emerald-400',
        bgColor: 'bg-emerald-500',
        borderColor: 'border-emerald-500',
        desc: '分かれているテーブルを結合したり、分析しやすいように文字列や数値を変換・カテゴリ分け・整形するステップです。'
      },
      {
        id: 'analyze',
        title: 'フェーズ3: 分析 (Analyze)',
        icon: PieChartIcon,
        color: 'text-purple-400',
        bgColor: 'bg-purple-500',
        borderColor: 'border-purple-500',
        desc: 'きれいに加工されたデータを集計し、ビジネスの意思決定に必要なインサイト（示唆）を導き出す最終ステップです。'
      }
    ];

    const levels = [
      // === 抽出フェーズ ===
      {
        id: 1, phaseId: 'extract',
        title: "基本的なデータ抽出 (SELECT, WHERE)",
        questions: [
          { id: 1, text: "すべての商品情報を取得する。", answer: "SELECT * FROM Products;" },
          { id: 2, text: "商品テーブルから「商品名」と「価格」だけを取得する。", answer: "SELECT product_name, price FROM Products;" },
          { id: 3, text: "「家電」カテゴリの商品すべてを取得する。", answer: "SELECT * FROM Products WHERE category = '家電';" },
          { id: 4, text: "価格が10,000円以上の商品を取得する。", answer: "SELECT * FROM Products WHERE price >= 10000;" },
          { id: 5, text: "「本」カテゴリで、かつ価格が3,000円以下の商品を取得する。", answer: "SELECT * FROM Products WHERE category = '本' AND price <= 3000;" },
          { id: 6, text: "プレミアム会員（is_premium = 1）の顧客情報を取得する。", answer: "SELECT * FROM Customers WHERE is_premium = 1;" },
          { id: 7, text: "ステータスが「キャンセル」の注文すべてを取得する。", answer: "SELECT * FROM Orders WHERE status = 'キャンセル';" },
          { id: 8, text: "評価（星の数）が5のレビューすべてを取得する。", answer: "SELECT * FROM Reviews WHERE rating = 5;" },
          { id: 9, text: "注文金額が5,000円〜10,000円の間の注文を取得する。（BETWEEN句を使用）", answer: "SELECT * FROM Orders WHERE total_amount BETWEEN 5000 AND 10000;" },
          { id: 10, text: "商品名が「Echo」から始まる商品を取得する。（LIKE句を使用）", answer: "SELECT * FROM Products WHERE product_name LIKE 'Echo%';" }
        ]
      },
      {
        id: 2, phaseId: 'extract',
        title: "データの並べ替えと制限 (ORDER BY, LIMIT)",
        questions: [
          { id: 11, text: "商品を価格の高い順（降順）に並べて取得する。", answer: "SELECT * FROM Products ORDER BY price DESC;" },
          { id: 12, text: "商品をカテゴリ順に並べ、同じカテゴリ内では価格の安い順（昇順）に並べる。", answer: "SELECT * FROM Products ORDER BY category ASC, price ASC;" },
          { id: 13, text: "最新のレビューを10件だけ取得する。", answer: "SELECT * FROM Reviews ORDER BY review_date DESC LIMIT 10;" },
          { id: 14, text: "最も注文金額が高い注文をトップ5件だけ取得する。", answer: "SELECT * FROM Orders ORDER BY total_amount DESC LIMIT 5;" },
          { id: 15, text: "価格が安い「日用品」カテゴリの商品トップ3件を取得する。", answer: "SELECT * FROM Products WHERE category = '日用品' ORDER BY price ASC LIMIT 3;" }
        ]
      },

      // === 加工フェーズ ===
      {
        id: 3, phaseId: 'transform',
        title: "テーブルの結合 (INNER JOIN, LEFT JOIN)",
        questions: [
          { id: 16, text: "注文情報（Orders）と顧客情報（Customers）を結合し、「注文ID」と「顧客名」を取得する。", answer: "SELECT O.order_id, C.customer_name FROM Orders AS O INNER JOIN Customers AS C ON O.customer_id = C.customer_id;" },
          { id: 17, text: "注文詳細（OrderDetails）と商品情報（Products）を結合し、「注文ID」「商品名」「数量」を取得する。", answer: "SELECT OD.order_id, P.product_name, OD.quantity FROM OrderDetails AS OD INNER JOIN Products AS P ON OD.product_id = P.product_id;" },
          { id: 18, text: "レビュー（Reviews）と商品情報（Products）を結合し、「商品名」と「評価（星の数）」を取得する。", answer: "SELECT P.product_name, R.rating FROM Reviews AS R INNER JOIN Products AS P ON R.product_id = P.product_id;" },
          { id: 19, text: "「家電」カテゴリの商品を買った顧客の「顧客名」を重複なく取得する。", answer: "SELECT DISTINCT C.customer_name FROM Customers AS C INNER JOIN Orders AS O ON C.customer_id = O.customer_id INNER JOIN OrderDetails AS OD ON O.order_id = OD.order_id INNER JOIN Products AS P ON OD.product_id = P.product_id WHERE P.category = '家電';" },
          { id: 20, text: "プレミアム会員が買った商品の「商品名」を重複なく取得する。", answer: "SELECT DISTINCT P.product_name FROM Products AS P INNER JOIN OrderDetails AS OD ON P.product_id = OD.product_id INNER JOIN Orders AS O ON OD.order_id = O.order_id INNER JOIN Customers AS C ON O.customer_id = C.customer_id WHERE C.is_premium = 1;" },
          { id: 21, text: "評価が1（最低評価）のレビューがついている「商品名」と「そのレビューを書いた顧客名」を取得する。", answer: "SELECT P.product_name, C.customer_name FROM Reviews AS R INNER JOIN Products AS P ON R.product_id = P.product_id INNER JOIN Customers AS C ON R.customer_id = C.customer_id WHERE R.rating = 1;" },
          { id: 22, text: "（LEFT JOIN）すべての商品情報と、もし売れていればその注文数量を取得する。", answer: "SELECT P.product_name, OD.quantity FROM Products P LEFT JOIN OrderDetails OD ON P.product_id = OD.product_id;" },
          { id: 23, text: "（LEFT JOIN）すべての顧客情報と、もし注文していればその注文IDを取得する。", answer: "SELECT C.customer_name, O.order_id FROM Customers C LEFT JOIN Orders O ON C.customer_id = O.customer_id;" },
          { id: 24, text: "「本」カテゴリの中で、一度も注文されたことがない商品を取得する。", hint: "LEFT JOIN と WHERE ... IS NULL を使用します。", answer: "SELECT P.product_name FROM Products P LEFT JOIN OrderDetails OD ON P.product_id = OD.product_id WHERE P.category = '本' AND OD.order_id IS NULL;" },
          { id: 25, text: "（自己結合）同じ日に複数回注文している顧客を取得する。", answer: "SELECT DISTINCT O1.customer_id, O1.order_date FROM Orders O1 INNER JOIN Orders O2 ON O1.customer_id = O2.customer_id AND O1.order_date = O2.order_date AND O1.order_id <> O2.order_id;" }
        ]
      },
      {
        id: 4, phaseId: 'transform',
        title: "データの整形と条件分岐 (CASE, 関数)",
        questions: [
          { id: 26, text: "顧客の「プレミアムフラグ（1/0）」を、CASE式を使って「プレミアム」「通常」という文字列（member_type）に変換して取得する。", hint: "CASE WHEN 条件 THEN 結果 ELSE 結果 END を使います。", answer: "SELECT customer_name,\n       CASE WHEN is_premium = 1 THEN 'プレミアム' ELSE '通常' END AS member_type\nFROM Customers;" },
          { id: 27, text: "商品の価格に応じて、3000円未満を「安価」、3000円以上10000円未満を「中程度」、10000円以上を「高価」に分類（price_category）して取得する。", answer: "SELECT product_name, price,\n       CASE \n         WHEN price < 3000 THEN '安価'\n         WHEN price >= 3000 AND price < 10000 THEN '中程度'\n         ELSE '高価'\n       END AS price_category\nFROM Products;" },
          { id: 28, text: "商品名が長すぎるため、最初の10文字だけを切り出して取得する。（SUBSTRINGまたはSUBSTRを使用）", answer: "-- データベースによって関数名が異なります。\nSELECT SUBSTRING(product_name, 1, 10) AS short_name\nFROM Products;" },
          { id: 29, text: "注文日（order_date）から「年」と「月」だけを抽出して取得する。（DATE_FORMATやTO_CHARを使用）", answer: "-- 例 (MySQLの場合):\nSELECT DATE_FORMAT(order_date, '%Y-%m') AS order_month\nFROM Orders;" },
          { id: 30, text: "全顧客のリストと注文合計金額を取得する。まだ一度も注文したことがない顧客は、NULLではなく「0」として表示する。", hint: "LEFT JOIN と NULL値を変換する関数（COALESCE や IFNULL）を使います。", answer: "-- 例 (MySQLの場合):\nSELECT C.customer_name, IFNULL(SUM(O.total_amount), 0) AS total_spent\nFROM Customers C\nLEFT JOIN Orders O ON C.customer_id = O.customer_id\nGROUP BY C.customer_name;" }
        ]
      },

      // === 分析フェーズ ===
      {
        id: 5, phaseId: 'analyze',
        title: "集計とグループ化 (GROUP BY, 集計関数)",
        questions: [
          { id: 31, text: "テーブル内にある商品の総数を計算する。", answer: "SELECT COUNT(*) FROM Products;" },
          { id: 32, text: "全注文の合計金額を計算する。", answer: "SELECT SUM(total_amount) FROM Orders;" },
          { id: 33, text: "全商品の平均価格を計算する。", answer: "SELECT AVG(price) FROM Products;" },
          { id: 34, text: "カテゴリごとに商品の数を計算する。", answer: "SELECT category, COUNT(product_id) FROM Products GROUP BY category;" },
          { id: 35, text: "カテゴリごとに商品の平均価格を計算する。", answer: "SELECT category, AVG(price) FROM Products GROUP BY category;" },
          { id: 36, text: "注文日ごとに注文件数を計算する。", answer: "SELECT order_date, COUNT(order_id) FROM Orders GROUP BY order_date;" },
          { id: 37, text: "ステータスごとに注文の合計金額を計算する。", answer: "SELECT status, SUM(total_amount) FROM Orders GROUP BY status;" },
          { id: 38, text: "商品ごとにレビューの平均評価を計算する。", answer: "SELECT product_id, AVG(rating) FROM Reviews GROUP BY product_id;" },
          { id: 39, text: "顧客ごとに注文した回数（注文テーブルの行数）を計算する。", answer: "SELECT customer_id, COUNT(order_id) FROM Orders GROUP BY customer_id;" },
          { id: 40, text: "商品ごとに売れた総数量（注文詳細テーブル）を計算する。", answer: "SELECT product_id, SUM(quantity) FROM OrderDetails GROUP BY product_id;" }
        ]
      },
      {
        id: 6, phaseId: 'analyze',
        title: "集計結果のフィルタリング (HAVING)",
        questions: [
          { id: 41, text: "商品数が50個以上あるカテゴリだけを抽出する。", answer: "SELECT category, COUNT(product_id) FROM Products GROUP BY category HAVING COUNT(product_id) >= 50;" },
          { id: 42, text: "平均評価が4.0以上の商品だけを抽出する。", answer: "SELECT product_id, AVG(rating) FROM Reviews GROUP BY product_id HAVING AVG(rating) >= 4.0;" },
          { id: 43, text: "合計で100回以上注文している（優良）顧客だけを抽出する。", answer: "SELECT customer_id, COUNT(order_id) FROM Orders GROUP BY customer_id HAVING COUNT(order_id) >= 100;" },
          { id: 44, text: "キャンセルされた注文の合計金額が10万円を超えている日を抽出する。", answer: "SELECT order_date, SUM(total_amount) FROM Orders WHERE status = 'キャンセル' GROUP BY order_date HAVING SUM(total_amount) > 100000;" },
          { id: 45, text: "レビュー件数が10件以上あり、かつ平均評価が3.5以上の商品だけを抽出する。", answer: "SELECT product_id, COUNT(review_id), AVG(rating) FROM Reviews GROUP BY product_id HAVING COUNT(review_id) >= 10 AND AVG(rating) >= 3.5;" }
        ]
      },
      {
        id: 7, phaseId: 'analyze',
        title: "実践的な複合データ分析 (ビジネス指標)",
        questions: [
          { id: 46, text: "商品ごとに、レビューの「星5の件数」と「星1の件数」を横に並べて集計する。", hint: "SUM関数とCASE式を組み合わせて特定の条件だけをカウントします。", answer: "SELECT product_id,\n       SUM(CASE WHEN rating = 5 THEN 1 ELSE 0 END) AS star_5_count,\n       SUM(CASE WHEN rating = 1 THEN 1 ELSE 0 END) AS star_1_count\nFROM Reviews\nGROUP BY product_id;" },
          { id: 47, text: "月別に、注文合計金額の推移（売上トレンド）を集計する。", hint: "日付関数で月を抽出（加工）し、それでグループ化（分析）します。", answer: "-- 例 (MySQL等):\nSELECT DATE_FORMAT(order_date, '%Y-%m') AS order_month, SUM(total_amount) AS monthly_sales\nFROM Orders\nGROUP BY DATE_FORMAT(order_date, '%Y-%m')\nORDER BY order_month;" },
          { id: 48, text: "カテゴリごとに、最も価格が高い商品を取得する。", hint: "サブクエリを使用して、カテゴリごとのMAX(price)と一致する商品を探します。", answer: "-- サブクエリ例:\nSELECT P1.category, P1.product_name, P1.price\nFROM Products P1\nWHERE P1.price = (\n    SELECT MAX(price) \n    FROM Products P2 \n    WHERE P1.category = P2.category\n);" },
          { id: 49, text: "顧客ごとに、これまでの「キャンセル率（キャンセル回数 / 全注文回数）」を計算する。", hint: "CASE式でキャンセルの時だけ1を返し、それを全体のCOUNTで割ります。", answer: "SELECT customer_id,\n       SUM(CASE WHEN status = 'キャンセル' THEN 1 ELSE 0 END) * 1.0 / COUNT(*) AS cancel_rate\nFROM Orders\nGROUP BY customer_id;" },
          { id: 50, text: "全注文の合計金額に対する、各カテゴリの売上構成比（%）を計算する。", hint: "サブクエリで全体の合計を出し、カテゴリの合計をそれで割ります。", answer: "SELECT P.category, \n       SUM(OD.quantity * OD.unit_price) * 100.0 / (\n           SELECT SUM(total_amount) FROM Orders\n       ) AS sales_ratio\nFROM OrderDetails OD\nINNER JOIN Products P ON OD.product_id = P.product_id\nGROUP BY P.category;" }
        ]
      }
    ];

    // --- コンポーネント定義 ---
    const TableSchema = ({ table }) => (
      <div className="bg-white border border-gray-200 rounded-lg shadow-sm mb-6 overflow-hidden">
        <div className="bg-slate-50 px-4 py-3 border-b border-gray-200 font-semibold text-slate-800 flex items-center">
          <DatabaseIcon className="w-5 h-5 mr-2 text-slate-500" />
          {table.name}
        </div>
        <div className="overflow-x-auto">
          <table className="w-full text-sm text-left">
            <thead className="bg-gray-50 text-gray-500 uppercase text-xs">
              <tr>
                <th className="px-4 py-3 font-medium">カラム名</th>
                <th className="px-4 py-3 font-medium">データ型(想定)</th>
                <th className="px-4 py-3 font-medium">説明</th>
              </tr>
            </thead>
            <tbody className="divide-y divide-gray-100">
              {table.columns.map((col, idx) => (
                <tr key={idx} className="hover:bg-slate-50 transition-colors">
                  <td className="px-4 py-2 font-mono text-blue-600">{col.name}</td>
                  <td className="px-4 py-2 text-slate-500 text-xs">{col.type}</td>
                  <td className="px-4 py-2 text-slate-700">{col.desc}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    );

    const QuestionCard = ({ question, result, phaseColor, onResultChange }) => {
      const [showAnswer, setShowAnswer] = useState(false);
      const [userQuery, setUserQuery] = useState("");

      // 判定状態に応じて問題番号のバッジ色を変更
      let badgeColor = phaseColor;
      if (result === 'correct') badgeColor = "bg-green-500";
      if (result === 'incorrect') badgeColor = "bg-red-500";

      return (
        <div className="bg-white border border-gray-200 rounded-lg shadow-sm mb-6 overflow-hidden">
          <div className="px-6 py-4 bg-slate-50 border-b border-gray-200 flex items-start">
            <span className={`flex-shrink-0 ${badgeColor} text-white font-bold rounded-full w-8 h-8 flex items-center justify-center mr-3 mt-0.5 transition-colors`}>
              {question.id}
            </span>
            <div className="flex-grow">
              <h3 className="text-lg font-medium text-slate-800 leading-snug">
                {question.text}
              </h3>
              {question.hint && (
                <div className="mt-2 text-sm text-amber-700 bg-amber-50 p-2 rounded flex items-start">
                  <LightbulbIcon className="w-4 h-4 mr-1.5 flex-shrink-0 mt-0.5" />
                  <span>{question.hint}</span>
                </div>
              )}
            </div>
          </div>
          
          <div className="p-6">
            <div className="mb-4">
              <label className="block text-sm font-medium text-slate-600 mb-2 flex items-center">
                <CodeIcon className="w-4 h-4 mr-1" /> あなたのクエリ
              </label>
              <textarea
                className="w-full font-mono text-sm bg-slate-900 text-green-400 p-4 rounded-md outline-none focus:ring-2 focus:ring-slate-400 transition-all resize-y min-h-[100px]"
                placeholder="SELECT ... FROM ..."
                value={userQuery}
                onChange={(e) => setUserQuery(e.target.value)}
                spellCheck="false"
              />
            </div>

            <button
              onClick={() => setShowAnswer(!showAnswer)}
              className="text-sm font-semibold flex items-center text-blue-600 hover:text-blue-800 transition-colors"
            >
              {showAnswer ? <ChevronUpIcon className="w-4 h-4 mr-1" /> : <ChevronDownIcon className="w-4 h-4 mr-1" />}
              {showAnswer ? "解答を隠す" : "解答例を見る"}
            </button>

            {showAnswer && (
              <div className="mt-4 animate-in fade-in duration-300">
                <div className="bg-slate-100 rounded-md p-4 relative border border-slate-200 mb-4">
                  <span className="absolute top-2 right-2 text-xs font-bold text-slate-400 uppercase tracking-wider">Answer</span>
                  <pre className="font-mono text-sm text-slate-800 whitespace-pre-wrap">{question.answer}</pre>
                </div>

                <div className="flex flex-col sm:flex-row sm:items-center justify-between p-4 bg-slate-50 rounded-md border border-slate-200">
                  <div className="text-sm font-medium text-slate-700 mb-3 sm:mb-0">
                    自己採点：この問題は自力で解けましたか？
                  </div>
                  <div className="flex space-x-2">
                    <button 
                      onClick={() => onResultChange(question.id, 'correct')}
                      className={`px-4 py-2 text-sm font-bold rounded shadow-sm transition-colors ${result === 'correct' ? 'bg-green-500 text-white' : 'bg-white text-green-600 border border-green-200 hover:bg-green-50'}`}
                    >
                      👍 正解
                    </button>
                    <button 
                      onClick={() => onResultChange(question.id, 'incorrect')}
                      className={`px-4 py-2 text-sm font-bold rounded shadow-sm transition-colors ${result === 'incorrect' ? 'bg-red-500 text-white' : 'bg-white text-red-600 border border-red-200 hover:bg-red-50'}`}
                    >
                      👎 間違えた
                    </button>
                  </div>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    };

    const SchemaViewer = () => {
      const [isOpen, setIsOpen] = useState(false);
      return (
        <div className="mb-8 bg-white border border-gray-200 rounded-lg shadow-sm overflow-hidden">
          <button 
            onClick={() => setIsOpen(!isOpen)}
            className="w-full px-6 py-3 flex items-center justify-between bg-slate-800 text-white hover:bg-slate-700 transition-colors font-medium text-sm"
          >
            <span className="flex items-center">
              <DatabaseIcon className="w-4 h-4 mr-2 text-slate-400" />
              テーブル定義 (Schema) を表示 / 非表示
            </span>
            {isOpen ? <ChevronUpIcon className="w-4 h-4" /> : <ChevronDownIcon className="w-4 h-4" />}
          </button>
          {isOpen && (
            <div className="p-6 border-t border-gray-200 bg-slate-50 max-h-[500px] overflow-y-auto space-y-6 shadow-inner">
              {schemaData.map((table, idx) => (
                <TableSchema key={idx} table={table} />
              ))}
            </div>
          )}
        </div>
      );
    };

    const ResultsView = ({ results, levels, onResultChange }) => {
      const allQuestions = levels.flatMap(l => l.questions);
      const incorrectQuestions = allQuestions.filter(q => results[q.id] === 'incorrect');

      const total = allQuestions.length;
      const correct = Object.values(results).filter(r => r === 'correct').length;
      const incorrect = incorrectQuestions.length;
      const progress = Math.round(((correct + incorrect) / total) * 100) || 0;
      
      return (
        <div className="animate-in fade-in duration-500">
          <div className="mb-8">
            <h2 className="text-3xl font-bold text-slate-800 border-b-2 border-slate-300 pb-2 inline-block">
              学習結果・復習
            </h2>
          </div>
          
          <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-10">
            <div className="bg-white p-6 rounded-lg shadow-sm border border-green-200 text-center">
              <div className="text-sm text-green-600 font-bold mb-1 uppercase tracking-wider">正解した問題</div>
              <div className="text-4xl font-bold text-slate-800">{correct} <span className="text-lg text-slate-400 font-medium">/ {total}</span></div>
            </div>
            <div className="bg-white p-6 rounded-lg shadow-sm border border-red-200 text-center">
              <div className="text-sm text-red-600 font-bold mb-1 uppercase tracking-wider">要復習（間違えた）</div>
              <div className="text-4xl font-bold text-slate-800">{incorrect} <span className="text-lg text-slate-400 font-medium">問</span></div>
            </div>
            <div className="bg-white p-6 rounded-lg shadow-sm border border-blue-200 text-center">
              <div className="text-sm text-blue-600 font-bold mb-1 uppercase tracking-wider">解答済みの進捗</div>
              <div className="text-4xl font-bold text-slate-800">{progress} <span className="text-lg text-slate-400 font-medium">%</span></div>
            </div>
          </div>

          <h3 className="text-xl font-bold text-slate-800 mb-4 border-b-2 border-slate-300 pb-2 inline-block">
            📝 復習リスト（間違えた問題）
          </h3>

          {incorrectQuestions.length === 0 ? (
            <div className="bg-white p-12 rounded-lg shadow-sm border border-gray-200 text-center text-slate-500">
              <div className="text-4xl mb-4">🎉</div>
              現在、復習が必要な問題はありません。<br/>引き続き他のレベルに挑戦しましょう！
            </div>
          ) : (
            <div className="space-y-6">
              <p className="text-slate-600 mb-4">
                過去に「間違えた」と記録した問題の一覧です。ここで解き直して「👍正解」に変更すると、このリストから消えます。
              </p>
              {incorrectQuestions.map(q => {
                // 問題が属するフェーズの色を取得
                const level = levels.find(l => l.questions.some(qq => qq.id === q.id));
                const phase = phases.find(p => p.id === level.phaseId);
                return (
                  <QuestionCard 
                    key={q.id} 
                    question={q} 
                    result={results[q.id]} 
                    phaseColor={phase.bgColor}
                    onResultChange={onResultChange} 
                  />
                )
              })}
            </div>
          )}
        </div>
      );
    };

    const App = () => {
      const [activeTab, setActiveTab] = useState('schema');
      const [results, setResults] = useState({});

      const handleResultChange = (questionId, status) => {
        setResults(prev => ({ ...prev, [questionId]: status }));
      };

      return (
        <div className="min-h-screen flex flex-col md:flex-row">
          
          {/* Sidebar */}
          <aside className="w-full md:w-64 bg-[#1e293b] text-white flex-shrink-0 flex flex-col shadow-xl z-10">
            <div className="p-4 border-b border-slate-700 flex items-center space-x-2">
              <DatabaseIcon className="w-6 h-6 text-slate-300" />
              <h1 className="text-xl font-bold tracking-tight">Data SQL Flow</h1>
            </div>
            
            <div className="flex-1 overflow-y-auto p-4 space-y-1">
              <button
                onClick={() => setActiveTab('schema')}
                className={`w-full text-left px-3 py-2.5 rounded-md text-sm font-medium transition-colors flex items-center mb-4 ${
                  activeTab === 'schema' ? 'bg-slate-700 text-white' : 'text-slate-300 hover:bg-slate-800'
                }`}
              >
                <BookOpenIcon className="w-4 h-4 mr-2" />
                テーブル定義 (Schema)
              </button>
              
              {/* フェーズごとにグループ化して表示 */}
              {phases.map(phase => (
                <div key={phase.id} className="pt-2 pb-3">
                  <div className={`flex items-center px-3 text-xs font-bold uppercase tracking-wider mb-2 ${phase.color}`}>
                    <phase.icon className="w-4 h-4 mr-1.5" /> {phase.title.split(' ')[0]}
                  </div>
                  <div className="space-y-1">
                    {levels.filter(l => l.phaseId === phase.id).map(level => (
                      <button
                        key={level.id}
                        onClick={() => setActiveTab(level.id)}
                        className={`w-full text-left px-3 py-2 rounded-md text-sm transition-colors flex items-start ${
                          activeTab === level.id 
                            ? `bg-slate-800 text-white font-medium border-l-4 ${phase.borderColor}` 
                            : 'text-slate-400 hover:bg-slate-800 border-l-4 border-transparent'
                        }`}
                      >
                        <span className="mr-2 mt-0.5 opacity-70">Lv.{level.id}</span>
                        <span className="line-clamp-2 leading-tight">{level.title}</span>
                      </button>
                    ))}
                  </div>
                </div>
              ))}

              <div className="pt-4 mt-2 border-t border-slate-700">
                <button
                  onClick={() => setActiveTab('results')}
                  className={`w-full text-left px-3 py-2.5 rounded-md text-sm font-medium transition-colors flex items-center ${
                    activeTab === 'results' ? 'bg-slate-700 text-white' : 'text-slate-300 hover:bg-slate-800'
                  }`}
                >
                  <BarChartIcon className="w-4 h-4 mr-2" />
                  学習結果・復習
                </button>
              </div>
            </div>
          </aside>

          {/* Main Content */}
          <main className="flex-1 h-screen overflow-y-auto p-4 md:p-8 bg-slate-100">
            <div className="max-w-4xl mx-auto">
              
              {activeTab === 'schema' && (
                <div className="animate-in fade-in duration-500">
                  <h2 className="text-2xl font-bold mb-2 text-slate-800 border-b-2 border-slate-300 pb-2 inline-block">
                    前提となるテーブル構造
                  </h2>
                  <p className="text-slate-600 mb-8 mt-2">
                    Amazonのデータ抽出業務を想定した5つの主要テーブルです。問題を解く際のリファレンスとして活用してください。
                  </p>
                  <div className="space-y-6">
                    {schemaData.map((table, idx) => (
                      <TableSchema key={idx} table={table} />
                    ))}
                  </div>
                </div>
              )}

              {typeof activeTab === 'number' && (
                <div className="animate-in fade-in duration-500">
                  {levels.filter(l => l.id === activeTab).map(level => {
                    const currentPhase = phases.find(p => p.id === level.phaseId);
                    return (
                      <div key={level.id}>
                        {/* フェーズの解説ヘッダー */}
                        <div className="mb-6 p-5 rounded-lg bg-white border border-slate-200 shadow-sm flex items-start">
                          <div className={`p-3 rounded-full ${currentPhase.bgColor} text-white mr-4 shadow-sm flex-shrink-0 mt-1`}>
                            <currentPhase.icon className="w-6 h-6" />
                          </div>
                          <div>
                            <div className={`text-sm font-bold mb-1 ${currentPhase.color}`}>
                              {currentPhase.title}
                            </div>
                            <p className="text-slate-600 text-sm leading-relaxed">
                              {currentPhase.desc}
                            </p>
                          </div>
                        </div>

                        <div className="mb-8">
                          <div className="flex items-center text-slate-500 mb-2 font-bold tracking-wide">
                            <PlayIcon className="w-5 h-5 mr-1" />
                            LEVEL {level.id}
                          </div>
                          <h2 className="text-3xl font-bold text-slate-800">{level.title}</h2>
                        </div>

                        <SchemaViewer />

                        <div className="space-y-6">
                          {level.questions.map(q => (
                            <QuestionCard 
                              key={q.id} 
                              question={q} 
                              result={results[q.id]} 
                              phaseColor={currentPhase.bgColor}
                              onResultChange={handleResultChange} 
                            />
                          ))}
                        </div>
                      </div>
                    )
                  })}
                </div>
              )}

              {activeTab === 'results' && (
                <ResultsView 
                  results={results} 
                  levels={levels} 
                  onResultChange={handleResultChange} 
                />
              )}

            </div>
          </main>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>

  <style>
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .animate-in { animation: fadeIn 0.4s ease-out forwards; }
  </style>
</body>
</html>
